services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:      
      - /data/mongo-data:/data/db
    expose:
      - "27017"
    env_file:
      - .env

  backend:
    image: ghcr.io/scalio-cloud/selfhosted-scalionexus-backend:latest
    restart: unless-stopped
    depends_on:
      - mongo
    expose:
      - "8000"
    env_file:
      - .env


  frontend:
    image: ghcr.io/scalio-cloud/selfhosted-scalionexus-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    env_file:
      - .env

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt:rw
      - ./certbot/www:/var/www/certbot:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
