server {
    listen 80;
    server_name entraconsole.domain.com;


    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }


    location / {
        return 301 https://$host$request_uri;
    }

}

server {
    listen 443 ssl;
    server_name entraconsole.domain.com;


    ssl_certificate /etc/letsencrypt/live/entraconsole.domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entraconsole.domain.com/privkey.pem;


    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://frontend:80; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


location /api/agent {
    
    rewrite ^/api/api(.*)$ /api$1 break;

    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}


location /api/auth/sso/ {
    rewrite ^/api/api(.*)$ /api$1 break;
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}


 
    location /api {

        if ($http_referer !~* "^https://entraconsole\.domain\.com") {
          return 403;
        }

         rewrite ^/api/api(.*)$ /api$1 break;
         proxy_pass http://backend:8000;
         proxy_set_header Host $host;

    }
}
